<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Currency Converter</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #0f172a, #1e3a8a);
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

.container-box {
    max-width: 500px;
    margin: 80px auto;
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 20px;
}

.result-box {
    margin-top: 20px;
    padding: 15px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    text-align: center;
}
</style>
</head>

<body>

<div class="container-box">
    <h2 class="text-center mb-4">💱 Currency Converter</h2>

    <div class="mb-3">
        <input type="number" id="amount" class="form-control" placeholder="Enter amount">
    </div>

    <div class="mb-3">
        <select id="from_currency" class="form-select">
            <option value="USD">USD</option>
            <option value="NPR">NPR</option>
            <option value="INR">INR</option>
            <option value="EUR">EUR</option>
        </select>
    </div>

    <div class="mb-3">
        <select id="to_currency" class="form-select">
            <option value="NPR">NPR</option>
            <option value="USD">USD</option>
            <option value="INR">INR</option>
            <option value="EUR">EUR</option>
        </select>
    </div>

    <button onclick="convertCurrency()" class="btn btn-primary w-100">Convert</button>

    <div id="result" class="result-box d-none"></div>
</div>

<script>
function convertCurrency() {
    const amount = document.getElementById("amount").value;
    const from_currency = document.getElementById("from_currency").value;
    const to_currency = document.getElementById("to_currency").value;

    fetch("http://127.0.0.1:8000/currency/create/",  {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            amount: amount,
            from_currency: from_currency,
            to_currency: to_currency
        })
    })
    .then(async res => {
        const text = await res.text();
        console.log("RAW RESPONSE:", text);  // 🔥 VERY IMPORTANT

        try {
            return JSON.parse(text);
        } catch (err) {
            throw new Error("Not JSON response → " + text);
        }
    })
    .then(data => {
        const resultBox = document.getElementById("result");

        if (data.error) {
            resultBox.innerHTML = "❌ " + data.error;
        } else {
            resultBox.innerHTML = `
                💰 Converted: <strong>${data.converted_amount.toFixed(2)}</strong><br>
                📊 Rate: ${data.conversion_rate.toFixed(4)}
            `;
        }

        resultBox.classList.remove("d-none");
    })
    .catch(err => {
        console.error("FINAL ERROR:", err);
    });
}
</script>

</body>
</html>
